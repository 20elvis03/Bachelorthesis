# Shared world-level bridge for multi-robot setup.
# These topics are global (not per-robot).

# ── SYSTEM ─────────────────────────────────────────────────────

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/world/pose_info"
  gz_topic_name: "/world/airport_terminal_world/dynamic_pose/info"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

